<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - GPTImage2</title>
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --secondary: #3B82F6;
            --accent: #06B6D4;
            --bg-dark: #0F0F1A;
            --bg-card: #1A1A2E;
            --bg-card-hover: #252542;
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1AA;
            --text-muted: #71717A;
            --gradient-primary: linear-gradient(135deg, #8B5CF6 0%, #3B82F6 50%, #06B6D4 100%);
            --gradient-bg: linear-gradient(180deg, #0F0F1A 0%, #1A1A2E 100%);
            --border-color: rgba(139, 92, 246, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--gradient-bg);
            color: var(--text-primary);
            line-height: 1.8;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
        }
        nav .container { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-size: 1.5rem; font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-cta {
            background: var(--gradient-primary); color: white; padding: 10px 24px;
            border-radius: 8px; text-decoration: none; font-weight: 600;
        }
        header {
            padding: 140px 20px 60px;
            text-align: center;
            background: var(--bg-dark);
        }
        header h1 { font-size: 2.5rem; margin-bottom: 16px; }
        header p { color: var(--text-secondary); font-size: 1.1rem; }
        .contact-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;
            padding: 60px 0;
        }
        .contact-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 40px; text-align: center;
            transition: all 0.3s;
        }
        .contact-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .contact-icon { font-size: 3rem; margin-bottom: 20px; }
        .contact-card h3 { font-size: 1.3rem; margin-bottom: 12px; }
        .contact-card p { color: var(--text-secondary); font-size: 0.95rem; }
        .contact-card a { color: var(--primary); text-decoration: none; }
        .contact-card a:hover { text-decoration: underline; }
        .form-section {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 50px; margin-bottom: 60px;
        }
        .form-section h2 { font-size: 1.8rem; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px 18px; background: var(--bg-dark);
            border: 1px solid var(--border-color); border-radius: 10px;
            color: var(--text-primary); font-size: 1rem; font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none; border-color: var(--primary);
        }
        .form-group textarea { min-height: 150px; resize: vertical; }
        .submit-btn {
            width: 100%; padding: 16px; background: var(--gradient-primary);
            color: white; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        .response-info {
            background: var(--bg-dark); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 24px; text-align: center;
            margin-top: 30px;
        }
        .response-info p { color: var(--text-secondary); }
        .response-info strong { color: var(--primary); }
        footer {
            background: var(--bg-card); border-top: 1px solid var(--border-color);
            padding: 40px 0; text-align: center;
        }
        footer p { color: var(--text-muted); font-size: 0.9rem; }
        .footer-links { margin-top: 20px; }
        .footer-links a { color: var(--text-secondary); text-decoration: none; margin: 0 16px; }
        .footer-links a:hover { color: var(--primary); }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            header h1 { font-size: 2rem; }
            .contact-grid { grid-template-columns: 1fr; }
            .form-section { padding: 30px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">GPTImage2</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="privacy.html">隐私政策</a></li>
            </ul>
            <a href="index.html#cta" class="nav-cta">开始使用</a>
        </div>
    </nav>

    <header>
        <div class="container">
            <h1>联系我们</h1>
            <p>有问题或建议？我们随时为您服务</p>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="contact-grid">
                <div class="contact-card">
                    <div class="contact-icon">📧</div>
                    <h3>电子邮件</h3>
                    <p>对于一般咨询和支援</p>
                    <a href="mailto:support@gptimage2-landing.vercel.app">support@gptimage2-landing.vercel.app</a>
                </div>
                <div class="contact-card">
                    <div class="contact-icon">💬</div>
                    <h3>即时通讯</h3>
                    <p>快速响应，通常在24小时内</p>
                    <p style="color: var(--text-muted);">通过邮件联系我们</p>
                </div>
                <div class="contact-card">
                    <div class="contact-icon">🌍</div>
                    <h3>社交媒体</h3>
                    <p>关注我们获取最新更新</p>
                    <a href="#">Twitter / X</a>
                </div>
            </div>

            <div class="form-section">
                <h2>发送消息</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
                    </div>
                    <div class="form-group">
                        <label for="email">电子邮箱</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">主题</label>
                        <input type="text" id="subject" name="subject" placeholder="消息主题" required>
                    </div>
                    <div class="form-group">
                        <label for="message">消息内容</label>
                        <textarea id="message" name="message" placeholder="请详细描述您的问题或建议..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">发送消息</button>
                </form>
                <div class="response-info">
                    <p><strong>回复时间：</strong> 我们通常在 24-48 小时内回复您的消息</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 GPTImage2. 保留所有权利。</p>
            <div class="footer-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于我们</a>
                <a href="contact.html">联系我们</a>
                <a href="privacy.html">隐私政策</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('感谢您的消息！由于这是静态页面，表单暂时无法发送。请通过电子邮件联系我们：support@gptimage2-landing.vercel.app');
        });
    </script>
</body>
</html>
